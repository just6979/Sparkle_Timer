; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
build_cache_dir = .pio/build-cache
description = Countdown timer using Pimoroni Plasma 2350 W, and 2 NeoPixel strands

[env:plasma-rp2350-w]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pimoroni_plasma2350w
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m
build_flags =
	-DDEBUG_RP2040_WIRE -DDEBUG_RP2040_SPI -DDEBUG_RP2040_CORE
	-fstack-protector
	-DPIO_FRAMEWORK_ARDUINO_ENABLE_EXCEPTIONS
	-DPIO_FRAMEWORK_ARDUINO_ENABLE_RTTI
	-DPIO_FRAMEWORK_ARDUINO_ENABLE_BLUETOOTH
;	-DPIO_FRAMEWORK_ARDUINO_ENABLE_FREERTOS
lib_deps =
	adafruit/Adafruit NeoPixel@^1.15.4
